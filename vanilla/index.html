<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streak Index Navigator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <div class="logo" title="Streak Index">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="13 6 5 6 11 12 5 18 13 18" />
                        <line x1="19" y1="18" x2="19" y2="10" />
                        <line x1="19" y1="6" x2="19.01" y2="6" stroke-width="3" />
                    </svg>
                </div>
                <div class="mode-toggle">
                    <button id="btn-demo" class="active">Demo</button>
                    <button id="btn-live">Live</button>
                </div>
                <div id="last-outcome" class="last-outcome hidden"></div>
            </div>
            <div class="header-right">
                <button id="btn-action" class="action-btn" title="New Shoe">
                    <svg id="icon-refresh" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    <svg id="icon-edit" style="display: none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                
                <div id="live-input-panel" class="input-panel hidden">
                    <div class="input-buttons">
                        <button id="btn-p" class="btn-p">
                            <span class="lg">P</span>
                            <span class="sm">Player</span>
                        </button>
                        <button id="btn-b" class="btn-b">
                            <span class="lg">B</span>
                            <span class="sm">Banker</span>
                        </button>
                    </div>
                    <div class="panel-actions">
                        <button id="btn-undo" disabled><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg> Undo</button>
                        <button id="btn-clear" disabled><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg> Clear</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="display-container chart-container">
                <div id="chart-empty" class="empty-state">Simulating shoe...</div>
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0;">
                    <canvas id="streakChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-dialog">
            <h3>Clear Shoe Data?</h3>
            <p>This will permanently delete all recorded hands in the current live shoe. This action cannot be undone.</p>
            <div class="modal-actions">
                <button id="btn-cancel-clear" class="btn-cancel">Cancel</button>
                <button id="btn-confirm-clear" class="btn-confirm">Clear Data</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
